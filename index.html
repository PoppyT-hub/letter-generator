<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Letter Generator</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>

  <h1 class="mb-4">Player Letter Generator</h1>

  <div id="setup">

    <input type="number" id="numPlayers" class="form-control mb-3" min="1" max="20" />
    <button onclick="createNameInputs()" class="button">Next</button>
  </div>

  <div id="nameInputs" class="mt-4" style="display:none;">

  </div>

  <script src="script.js"></script>
</body>
</html>
